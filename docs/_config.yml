# --- Site Metadata ---
# --- Site Metadata & SEO Defaults ---
title: "LLM Adapter"
tagline: "Unified Python Wrapper for OpenAI & Gemini"
description: "Registry-driven Python adapter that lets developers call OpenAI and Gemini using the same API while returning normalized responses, tool calls, and usage metrics."
url: "https://vrraj.github.io"
baseurl: "/llm-adapter"

defaults:
  - scope:
      path: "" # Applies to all files
    values:
      layout: "default"

  - scope:
      path: "index.md"
    values:
      title: "LLM Adapter: Unified OpenAI & Gemini Interface"

  - scope:
      path: "api-reference.md"
    values:
      title: "API Reference | LLM Adapter"
      description: "Detailed API documentation for the create, embeddings, and normalization methods, including request parameters, AdapterResponse structure, and usage fields returned by the adapter."

  - scope:
      path: "model-registry.md"
    values:
      title: "Model Registry Guide | Supported LLMs"
      description: "Guide to the model registry architecture, explaining how model keys map to OpenAI and Gemini providers, how parameters are validated, and how developers can extend the registry with custom models."

  - scope:
      path: "development.md"
    values:
      title: "Development & Interactive Playground"
      description: "Developer guide for running the project locally, launching the interactive FastAPI playground, and testing model calls across OpenAI and Gemini providers."

# --- Theme Configuration ---
theme: jekyll-theme-cayman
show_downloads: true  

# --- Google Analytics (GA4) ---

google_analytics: G-YMXDNS4Y0L

# --- Plugins ---
plugins:
  - jekyll-seo-tag
  - jekyll-gist

# --- SEO Specifics ---
#  GitHub profile : vrraj/llm-adapter


# --- Build Settings ---
markdown: kramdown
highlighter: rouge
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
