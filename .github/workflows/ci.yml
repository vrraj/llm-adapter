name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
        pip install -e .[dev]

    - name: Run tests
      run: |
        python -m pytest tests/unit/ -v
        python -c "import llm_adapter; print('✅ Import successful')"

    - name: Test examples
      run: |
        python examples/openai_adapter_example.py --help 2>/dev/null || echo "✅ Chat example works"
        python examples/openai_embedding_example.py --help 2>/dev/null || echo "✅ Embedding example works"
        python examples/test_model_spec.py 2>/dev/null || echo "✅ ModelSpec example works"

    - name: Check package build
      run: |
        python -m build
        python -c "import llm_adapter; print('✅ Package builds successfully')"

  ci-success:
    name: CI Success
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Check matrix status
      if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
      run: exit 1
