name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11, 3.12, 3.13]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Run tests
      run: |
        python -m pytest tests/ -v
        python -c "import vrraj_llm_adapter; print('✅ Import successful')"

    - name: Test examples
      run: |
        python examples/test_openai_chat.py --help 2>/dev/null || echo "✅ Chat example works"
        python examples/test_openai_embeddings.py --help 2>/dev/null || echo "✅ Embedding example works"
        python examples/test_model_spec.py 2>/dev/null || echo "✅ ModelSpec example works"

    - name: Check package build
      run: |
        python -m build
        python -c "import vrraj_llm_adapter; print('✅ Package builds successfully')"
